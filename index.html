<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>🍦 香草AI 賽博後宮</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  body{margin:0;background:#0f0a1f;color:#e0b0ff;font-family:system-ui;}
  #app{height:100vh;display:flex;flex-direction:column;}
  header{background:linear-gradient(#4a0066,#6a008a);padding:10px;display:flex;align-items:center;justify-content:space-between;}
  .title{font-size:1.35em;font-weight:bold;}
  .tags{overflow-x:auto;white-space:nowrap;padding:8px;background:#140028;}
  .tag{background:#4a0066;color:white;margin:0 5px;padding:6px 12px;border-radius:20px;display:inline-block;}
  .cards{flex:1;overflow-y:auto;padding:10px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .card{position:relative;border-radius:12px;overflow:hidden;cursor:pointer;}
  .card img{width:100%;height:210px;object-fit:cover;}
  .overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,#000);padding:10px;color:white;}
  .bottom-nav{position:fixed;bottom:0;width:100%;background:#1a0033;display:flex;}
  .nav-item{flex:1;padding:10px;text-align:center;cursor:pointer;}
  .nav-item.active{color:#ff6ac8;background:#2a004a;}
</style>
</head>
<body>
<div id="app">
  <header>
    <span style="font-size:1.8em;cursor:pointer" onclick="alert('侧边栏已打开：我的角色 / 图库 / 排行 / 会员 / 设置')">三</span>
    <span class="title">🍦 香草AI 賽博後宮</span>
    <img id="avatar" src="https://via.placeholder.com/36" style="width:36px;height:36px;border-radius:50%;border:2px solid #ff6ac8;" onclick="alert('这是你的TG头像，已自动登录')">
  </header>

  <div style="display:flex;background:#2a004a;padding:8px;justify-content:space-around;font-size:0.9em;">
    <span>总榜</span><span style="color:#ff6ac8;font-weight:bold">飘升</span><span>最新</span><span onclick="alert('搜索')">🔍</span>
  </div>

  <div class="tags">
    <span class="tag">ntr</span><span class="tag">妈妈</span><span class="tag">萝莉</span><span class="tag">母子</span><span class="tag">媚黑</span><span class="tag">女s</span>
    <span class="tag" style="background:#ff6ac8;color:black" onclick="alert('展开全部50+标签')">↓ 更多</span>
  </div>

  <div id="pages">
    <!-- 首页卡片 -->
    <div id="home" class="cards">
      <!-- 你原来的角色卡片保持 -->
      <div class="card" onclick="switchToAlbum()"> <!-- 点击可进入图库演示 -->
        <img src="https://files.catbox.moe/4h5q3z.jpg">
        <div class="overlay"><b>抓着你鸡巴一边给你讲题...</b><br>师生·禁忌·嘲讽·手交<br>@然然 ★</div>
      </div>
      <!-- 其他卡片省略，你可以复制添加 -->
    </div>

    <!-- 图库页面（完全像你最新截图） -->
    <div id="album" style="display:none;padding:10px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px;">
      <!-- 这里放你刚生成的6张图片（替换下面的src为你保存后的catbox链接） -->
      <img src="https://files.catbox.moe/4h5q3z.jpg" style="width:100%;border-radius:12px;">
      <img src="https://files.catbox.moe/8k2j1p.jpg" style="width:100%;border-radius:12px;">
      <img src="https://files.catbox.moe/5j9k2m.jpg" style="width:100%;border-radius:12px;">
      <img src="https://files.catbox.moe/j3p8k9.jpg" style="width:100%;border-radius:12px;">
      <!-- 再加两张你保存的生成图片 -->
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchPage(0)">🏠 首页</div>
    <div class="nav-item" onclick="switchPage(1)">💬 聊天</div>
    <div class="nav-item" onclick="switchPage(2)">✍ 创作</div>
    <div class="nav-item" onclick="switchPage(3)">📸 图库</div>
    <div class="nav-item" onclick="switchPage(4)">👤 我的</div>
  </div>
</div>

<script>
Telegram.WebApp.ready(); Telegram.WebApp.expand();

function switchPage(n) {
  if (n === 3) {
    document.getElementById('home').style.display = 'none';
    document.getElementById('album').style.display = 'grid';
    alert('已进入角色相册！（你保存的6张图片已放好，替换src即可）');
  } else {
    document.getElementById('home').style.display = 'grid';
    document.getElementById('album').style.display = 'none';
  }
}

function switchToAlbum() {
  switchPage(3);
}

// TG头像自动加载
const u = Telegram.WebApp.initDataUnsafe.user || {};
document.getElementById('avatar').src = u.photo_url || 'https://via.placeholder.com/36?text=你';
</script>
</body>
</html>

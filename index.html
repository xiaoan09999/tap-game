<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Tap to Earn Game</title>
<style>
  body { margin:0; background:#0a0a0a; color:white; font-family:Arial; text-align:center; overflow:hidden; }
  .game { max-width:400px; margin:40px auto; padding:20px; }
  h1 { font-size:28px; margin:10px 0; }
  .coin { width:220px; height:220px; background:radial-gradient(circle, #ffeb3b, #f9c74f); border-radius:50%; margin:20px auto; box-shadow:0 0 60px #ffeb3b; cursor:pointer; transition:transform 0.1s; position:relative; }
  .coin:active { transform:scale(0.85); }
  .plus { position:absolute; color:#fff; font-size:24px; font-weight:bold; pointer-events:none; animation:fly 1s forwards; }
  @keyframes fly { 0%{top:50%;opacity:1} 100%{top:20%;opacity:0} }
  .info { font-size:18px; margin:10px 0; }
  .coins { font-size:42px; font-weight:bold; color:#ffeb3b; }
  .booster { background:#00ff00; color:black; padding:15px; border-radius:12px; margin:20px auto; width:90%; font-size:18px; cursor:pointer; }
  .wallet { background:#1f1f1f; padding:15px; border-radius:12px; margin:20px auto; }
  .withdraw { background:#ff4081; padding:12px; border-radius:12px; margin:15px auto; width:80%; color:white; font-size:16px; }
</style>
</head>
<body>
<div class="game">
  <h1>Tap to Earn Game</h1>
  <p>点击金币赚金币！每点一次 +1（加速后翻倍）</p>
  
  <div id="coin" class="coin">
    <div style="padding-top:80px; font-size:80px;">🪙</div>
  </div>

  <div class="info">你的金币</div>
  <div id="coins" class="coins">0</div>

  <div id="booster" class="booster">购买加速器（花费10金币）<br>30秒内点击翻倍！</div>

  <div class="wallet">
    <div style="font-size:18px;">钱包余额</div>
    <div id="balance" class="coins">0</div>
    <div id="withdraw" class="withdraw">💰 申请提现（Telegram Stars）</div>
  </div>
</div>

<script>
let coins = parseInt(localStorage.getItem('coins')) || 0;
let multiplier = 1;
let boostTime = 0;

const coinEl = document.getElementById('coin');
const coinsEl = document.getElementById('coins');
const balanceEl = document.getElementById('balance');

function updateUI() {
  coinsEl.textContent = coins;
  balanceEl.textContent = coins;
}
updateUI();

coinEl.addEventListener('click', (e) => {
  const gain = 1 * multiplier;
  coins += gain;
  localStorage.setItem('coins', coins);
  updateUI();

  // 飞金币特效
  const plus = document.createElement('div');
  plus.className = 'plus';
  plus.textContent = `+${gain}`;
  plus.style.left = (e.offsetX + 50) + 'px';
  plus.style.top = (e.offsetY) + 'px';
  coinEl.appendChild(plus);
  setTimeout(() => plus.remove(), 1000);
});

document.getElementById('booster').addEventListener('click', () => {
  if (coins >= 10 && boostTime <= 0) {
    coins -= 10;
    multiplier = 2;
    boostTime = 30;
    localStorage.setItem('coins', coins);
    updateUI();
    alert('加速器已激活！30秒内点击翻倍！');
    
    const timer = setInterval(() => {
      boostTime--;
      if (boostTime <= 0) {
        multiplier = 1;
        clearInterval(timer);
        alert('加速器时间结束！');
      }
    }, 1000);
  } else if (boostTime > 0) {
    alert('加速器正在运行中！剩余 ' + boostTime + ' 秒');
  } else {
    alert('金币不足！');
  }
});

document.getElementById('withdraw').addEventListener('click', () => {
  if (coins >= 50) {
    alert('提现申请已提交！\n你的 ' + coins + ' 金币将转换为 Telegram Stars\n（演示版，真实版可直接到账）');
  } else {
    alert('提现需要至少 50 金币哦～继续点击赚更多吧！');
  }
});
</script>
</body>
</html>

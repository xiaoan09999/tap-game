<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍦 香草AI 賽博後宮</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { margin:0; background:#0f0a1f; color:#e0b0ff; font-family:system-ui; overflow:hidden; }
    #app { height:100vh; display:flex; flex-direction:column; }
    header { background:linear-gradient(#4a0066, #2a004a); padding:12px; text-align:center; font-size:1.4em; border-bottom:3px solid #ff6ac8; display:flex; align-items:center; justify-content:space-between; }
    .user-info { font-size:0.7em; color:#ff6ac8; display:flex; align-items:center; gap:8px; }
    .user-info img { width:32px; height:32px; border-radius:50%; }
    .tabs { display:flex; background:#1a0033; border-bottom:2px solid #4a0066; }
    .tab { flex:1; padding:12px; text-align:center; cursor:pointer; font-weight:bold; }
    .tab.active { background:#ff6ac8; color:#0f0a1f; }
    .tags { overflow-x:auto; white-space:nowrap; padding:10px 0; background:#140028; -webkit-overflow-scrolling:touch; }
    .tag { background:#4a0066; color:white; margin:0 6px; padding:6px 14px; border-radius:20px; font-size:0.85em; display:inline-block; cursor:pointer; }
    .cards { flex:1; overflow-y:auto; padding:10px; display:grid; grid-template-columns: repeat(2, 1fr); gap:12px; height:calc(100vh - 200px); }
    .card { background:#1e0033; border-radius:12px; overflow:hidden; cursor:pointer; border:1px solid #4a0066; box-shadow:0 4px 8px rgba(0,0,0,0.3); }
    .card img { width:100%; height:180px; object-fit:cover; loading:lazy; }
    .card-info { padding:8px; }
    .card-title { font-size:0.95em; margin:0; line-height:1.3; }
    .card-tags { font-size:0.8em; color:#c0a0ff; margin-top:4px; }
    .bottom-nav { position:fixed; bottom:0; width:100%; background:#1a0033; display:flex; border-top:1px solid #4a0066; z-index:100; }
    .nav-item { flex:1; padding:8px 0; text-align:center; cursor:pointer; font-size:0.85em; color:#e0b0ff; }
    .nav-item.active { color:#ff6ac8; background:#2a004a; }
    #chat-page { display:none; flex-direction:column; height:100%; background:#0a0014; }
    #chat-header { background:#2a004a; padding:10px; display:flex; align-items:center; gap:10px; border-bottom:1px solid #4a0066; }
    #chat-box { flex:1; overflow-y:auto; padding:12px; }
    .msg { margin:10px 0; padding:10px 14px; border-radius:18px; max-width:80%; }
    .user-msg { background:#7b5eff; margin-left:auto; color:white; }
    .ai-msg { background:#4a0066; }
    #input-area { padding:12px; background:#1a0033; display:flex; gap:8px; border-top:1px solid #4a0066; }
    #input { flex:1; padding:12px 16px; border-radius:24px; border:none; background:#330066; color:white; }
    button { background:#ff6ac8; border:none; padding:12px 20px; border-radius:24px; color:white; font-weight:bold; cursor:pointer; }
    #diamonds { background:#ff6ac8; color:#0f0a1f; padding:6px 12px; border-radius:20px; font-size:0.9em; margin-left:auto; }
  </style>
</head>
<body>
<div id="app">
  <header>
    🍦 香草AI 賽博後宮
    <div id="diamonds">💎 <span id="diamond-count">4430</span></div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab(0)">首页</div>
    <div class="tab" onclick="switchTab(1)">聊天</div>
    <div class="tab" onclick="switchTab(2)">创作</div>
    <div class="tab" onclick="switchTab(3)">图库</div>
    <div class="tab" onclick="switchTab(4)">我的</div>
  </div>

  <div class="tags">
    <span class="tag">ntr</span>
    <span class="tag">妈妈</span>
    <span class="tag">萝莉</span>
    <span class="tag">母子</span>
    <span class="tag">媚黑</span>
    <span class="tag">女s</span>
    <span class="tag">绿帽</span>
    <span class="tag">明星</span>
    <span class="tag">重口</span>
    <span class="tag">伪娘</span>
    <span class="tag">调教</span>
    <span class="tag">催眠</span>
    <span class="tag" onclick="Telegram.WebApp.showAlert('更多标签：肉便器、熟女、人妻、男娘、足交...')">更多▼</span>
  </div>

  <div id="home-page" class="cards">
    <div class="card" onclick="enterChat('抓着你鸡巴一边给你讲题...', 'https://files.catbox.moe/4h5q3z.jpg')">
      <img src="https://files.catbox.moe/4h5q3z.jpg" alt="女教师" onerror="this.src='https://via.placeholder.com/300x200?text=加载失败'">
      <div class="card-info">
        <div class="card-title">抓着你鸡巴一边给你讲题一边嘲讽你的英语班主任</div>
        <div class="card-tags">师生 · 禁忌 · 嘲讽 · 手交</div>
      </div>
    </div>
    <div class="card" onclick="enterChat('调教挑战', 'https://files.catbox.moe/8k2j1p.jpg')">
      <img src="https://files.catbox.moe/8k2j1p.jpg" alt="调教" onerror="this.src='https://via.placeholder.com/300x200?text=加载失败'">
      <div class="card-info">
        <div class="card-title">调教挑战 - 你是一个三十多岁的已婚男...</div>
        <div class="card-tags">调教 · 母狗 · 服从 · 反差</div>
      </div>
    </div>
    <!-- 加更多示例角色 -->
    <div class="card" onclick="enterChat('媚黑调教', 'https://files.catbox.moe/5j9k2m.jpg')">
      <img src="https://files.catbox.moe/5j9k2m.jpg" alt="">
      <div class="card-info">
        <div class="card-title">媚黑调教 - 你的白人老婆被黑人...</div>
        <div class="card-tags">媚黑 · NTR · 绿帽</div>
      </div>
    </div>
    <!-- 继续加到10张左右，用户就能滚动了 -->
  </div>

  <div id="chat-page">
    <div id="chat-header">
      <img id="chat-avatar" src="" alt="">
      <div id="chat-title"></div>
    </div>
    <div id="chat-box"></div>
    <div id="input-area">
      <input id="input" placeholder="对她说点什么...">
      <button onclick="sendMsg()">发送</button>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab(0)">🏠 首页</div>
    <div class="nav-item" onclick="switchTab(1)">💬 聊天</div>
    <div class="nav-item" onclick="switchTab(2)">✍ 创作</div>
    <div class="nav-item" onclick="switchTab(3)">📸 图库</div>
    <div class="nav-item" onclick="switchTab(4)">👤 我的</div>
  </div>
</div>

<script>
Telegram.WebApp.ready();
Telegram.WebApp.expand();

const user = Telegram.WebApp.initDataUnsafe.user || { first_name: '主人' };
document.querySelector('header').innerHTML += `<div class="user-info"><img src="${user.photo_url || 'https://via.placeholder.com/32'}"><span>${user.first_name}</span></div>`;

let diamonds = localStorage.getItem('diamonds') ? parseInt(localStorage.getItem('diamonds')) : 4430;
function updateDiamonds() {
  document.getElementById('diamond-count').textContent = diamonds;
  localStorage.setItem('diamonds', diamonds);
}
updateDiamonds();

function switchTab(n) {
  document.querySelectorAll('.tab, .nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab')[n].classList.add('active');
  document.querySelectorAll('.nav-item')[n].classList.add('active');
  document.getElementById('home-page').style.display = n === 0 ? 'grid' : 'none';
  document.getElementById('chat-page').style.display = n === 1 ? 'flex' : 'none';
}

function enterChat(title, avatar) {
  switchTab(1);
  document.getElementById('chat-title').textContent = title;
  document.getElementById('chat-avatar').src = avatar;
  document.getElementById('chat-box').innerHTML = '';
  addMsg(title, "主人～终于来找人家了呢...今天想怎么欺负我呀？♡");
}

function addMsg(sender, text) {
  const box = document.getElementById('chat-box');
  box.innerHTML += `<div class="msg ${sender === user.first_name ? 'user-msg' : 'ai-msg'}">${text}</div>`;
  box.scrollTop = box.scrollHeight;
}

function sendMsg() {
  const input = document.getElementById('input');
  if (!input.value) return;
  addMsg(user.first_name, input.value);
  input.value = '';
  diamonds -= 5;
  updateDiamonds();
  Telegram.WebApp.HapticFeedback.impactOccurred('medium');
  setTimeout(() => addMsg("角色", "嗯～主人好坏...人家下面都湿了♡ 继续说嘛..."), 1200);
}

// 初始化
switchTab(0);
</script>
</body>
</html>

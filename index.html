<!DOCTYPE html>
<html lang="zh">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>🍀 香草AI 賽博後宮</title>
 <script src="https://telegram.org/js/telegram-web-app.js"></script>
 <style>
 body { margin:0; font-family:system-ui; background:#0d001a; color:#e0b0ff; overflow:hidden; }
 #app { height:100vh; display:flex; flex-direction:column; }
 header { background:linear-gradient(#2a004a, #4a0066); padding:12px; text-align:center; font-size:1.4em; border-bottom:2px solid #ff6ac8; }
 #role-list { padding:12px; display:flex; flex-wrap:wrap; gap:12px; background:#140028; }
 .role-card { width:calc(50% - 12px); background:#1e0038; border-radius:12px; padding:10px; text-align:center; cursor:pointer; border:1px solid #ff6ac8; }
 .role-card img { width:100%; height:140px; object-fit:cover; border-radius:8px; }
 .role-card h3 { margin:8px 0 4px; font-size:1.1em; }
 .role-card p { font-size:0.85em; color:#c0a0ff; margin:0; }
 #chat-container { flex:1; display:none; flex-direction:column; background:#0a0014; }
 #status-bar { background:#1e0038; padding:10px; border-bottom:1px solid #4a0066; font-size:0.9em; }
 .stat-row { display:flex; justify-content:space-between; margin:4px 0; }
 #chat { flex:1; overflow-y:auto; padding:12px; }
 .msg { max-width:80%; margin:8px 0; padding:10px 14px; border-radius:18px; }
 .user-msg { background:#7b00ff; margin-left:auto; color:white; }
 .ai-msg { background:#2a004a; }
 #input-area { padding:12px; background:#1e0038; display:flex; gap:8px; border-top:1px solid #4a0066; }
 #input { flex:1; padding:12px; border-radius:24px; border:none; background:#330066; color:#e0b0ff; }
 button { padding:12px 20px; background:#ff6ac8; border:none; border-radius:24px; color:white; font-weight:bold; }
 </style>
</head>
<body>
<div id="app">
 <header>🍀 香草AI 賽博後宮 </header>

 <!-- 首页：角色列表 -->
 <div id="role-list"></div>

 <!-- 聊天界面 -->
 <div id="chat-container">
 <div id="status-bar">
 <div class="stat-row"><span>角色：</span><strong id="current-role">...</strong></div>
 <div class="stat-row"><span>好感度：</span><span id="affection">0</span>/100 ❤️</div>
 <div class="stat-row"><span>隐秘欲望：</span><span id="desire">平静</span></div>
 <div class="stat-row"><span>当前心情：</span><span id="mood">期待</span></div>
 <div class="stat-row"><span>穿着：</span><span id="outfit">完整</span></div>
 </div>
 <div id="chat"></div>
 <div id="input-area">
 <input id="input" placeholder="对她说点什么..." />
 <button onclick="sendMessage()">发送</button>
 </div>
 </div>
</div>

<script>
Telegram.WebApp.ready();
Telegram.WebApp.expand();

const user = Telegram.WebApp.initDataUnsafe.user || { id: 'guest', first_name: '主人' };

// 角色数据（先3个，后面加到20+）
const roles = [
 { id:1, name:"小樱", tag:"傲娇女仆", desc:"爱撒娇的小女仆，容易脸红", prompt:"你是一个傲娇女仆，语气带点傲娇和害羞，常用哼、笨蛋主人等词。", avatar:"https://via.placeholder.com/300x200/330066/fff?text=小樱" },
 { id:2, name:"玲酱", tag:"病娇学妹", desc:"黏人又危险的学妹", prompt:"你是一个病娇学妹，语气甜腻但带占有欲，常用哥哥、嘻嘻、锁起来等词。", avatar:"https://via.placeholder.com/300x200/7b00ff/fff?text=玲酱" },
 { id:3, name:"女王", tag:"冷艳御姐", desc:"高冷支配型女王", prompt:"你是一个冷艳女王，语气高傲命令式，常用奴隶、跪下、赏你等词。", avatar:"https://via.placeholder.com/300x200/ff6ac8/000?text=女王" }
];

let currentRole = null;
let messages = [];
let affection = 30;

// 渲染角色卡片（首页）
function renderRoles() {
 const list = document.getElementById('role-list');
 list.innerHTML = '';
 roles.forEach(role => {
 const card = document.createElement('div');
 card.className = 'role-card';
 card.innerHTML = `
 <img src="${role.avatar}" alt="${role.name}">
 <h3>${role.name}</h3>
 <p>${role.tag}</p>
 `;
 card.onclick = () => startChat(role);
 list.appendChild(card);
 });
}

// 开始聊天
function startChat(role) {
 currentRole = role;
 affection = 30;
 messages = [];
 document.getElementById('role-list').style.display = 'none';
 document.getElementById('chat-container').style.display = 'flex';
 document.getElementById('current-role').textContent = role.name + ' (' + role.tag + ')';
 addMessage("系统", `${role.name}：主人～终于来找人家了呢...今天想怎么欺负我呀？♡`);
 updateStatus();
}

// 更新状态栏
function updateStatus() {
 document.getElementById('affection').textContent = affection;
 let desire = affection < 40 ? "平静" : affection < 60 ? "轻微悸动" : affection < 80 ? "心跳加速" : "强烈渴望";
 let mood = affection < 50 ? "期待" : affection < 70 ? "害羞" : affection < 90 ? "沉迷" : "完全沦陷";
 let outfit = affection < 50 ? "完整" : affection < 70 ? "微乱" : affection < 90 ? "半解" : "凌乱";
 document.getElementById('desire').textContent = desire;
 document.getElementById('mood').textContent = mood;
 document.getElementById('outfit').textContent = outfit;
}

// 添加消息
function addMessage(sender, text) {
 messages.push({sender, text});
 const chat = document.getElementById('chat');
 const div = document.createElement('div');
 div.className = sender === user.first_name ? 'msg user-msg' : 'msg ai-msg';
 div.textContent = text;
 chat.appendChild(div);
 chat.scrollTop = chat.scrollHeight;
}

// 发送消息
function sendMessage() {
 const input = document.getElementById('input');
 const text = input.value.trim();
 if (!text || !currentRole) return;
 addMessage(user.first_name, text);
 input.value = '';

 // 模拟AI回复（后期换真API）
 setTimeout(() => {
 // 简单规则模拟，根据prompt风格
 let reply = "";
 if (currentRole.name === "小樱") {
 reply = ["哼，才不是因为你这么说就开心呢笨蛋主人！", "呜...主人好坏，人家脸红了啦♡", "再多说点...小樱想听..."][Math.floor(Math.random()*3)];
 } else if (currentRole.name === "玲酱") {
 reply = ["哥哥只准看玲酱哦～不然玲酱生气了！", "嘻嘻...哥哥的味道好棒...", "玲酱下面好热...哥哥快来♡"][Math.floor(Math.random()*3)];
 } else {
 reply = ["跪下，奴隶。", "表现不错，赏你一点甜头。", "再不听话就锁起来哦～"][Math.floor(Math.random()*3)];
 }
 addMessage(currentRole.name, reply);
 affection = Math.min(100, affection + 5 + Math.floor(Math.random()*10));
 updateStatus();
 Telegram.WebApp.HapticFeedback.impactOccurred('medium');
 }, 1200);
}

// 初始化
renderRoles();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>🍀 香草AI 賽博後宮</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {margin:0; background:#0a0a14; color:#ff79c6; font-family: system-ui;}
    #app {max-width:420px; margin:auto; height:100vh; display:flex; flex-direction:column;}
    header {background:#1a1a2e; padding:12px; text-align:center; font-size:1.4em; border-bottom:2px solid #ff4d94;}
    #status {background:#16213e; padding:12px; margin:8px; border-radius:12px; font-size:0.95em;}
    .stat {margin:6px 0; display:flex; justify-content:space-between;}
    #chat {flex:1; overflow-y:auto; padding:12px; background:#111827;}
    .msg {max-width:80%; padding:12px 16px; border-radius:18px; margin:8px 0;}
    .user {background:#7b5eff; margin-left:auto; color:white;}
    .ai {background:#2a2a4a;}
    #input-area {padding:12px; background:#1a1a2e; display:flex; gap:8px;}
    #input {flex:1; padding:14px; border-radius:30px; border:none; background:#222; color:white;}
    button {padding:14px 24px; background:#ff4d94; border:none; border-radius:30px; color:white; font-weight:bold;}
  </style>
</head>
<body>
<div id="app">
  <header>🍀 香草AI 賽博後宮</header>
  
  <div id="status">
    <div class="stat">当前角色：<strong id="role-name">小樱（傲娇女仆）</strong></div>
    <div class="stat">好感度：<span id="aff">68</span>/100 ❤️</div>
    <div class="stat">隐秘欲望：<span id="desire">轻微发情</span></div>
    <div class="stat">当前心情：<span id="mood">害羞期待</span></div>
    <div class="stat">穿着：<span id="clothes">女仆装·裙摆微湿</span></div>
  </div>

  <div id="chat"></div>

  <div id="input-area">
    <input id="input" placeholder="对她说什么...（越色她越听话）" />
    <button onclick="sendMsg()">发送</button>
  </div>
</div>

<script>
Telegram.WebApp.ready();
Telegram.WebApp.expand();

let aff = 68;
let currentRole = "小樱（傲娇女仆）";
const chat = document.getElementById('chat');

function addMsg(text, who) {
  const div = document.createElement('div');
  div.className = `msg ${who}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function updateStatus() {
  aff = Math.min(100, aff + Math.floor(Math.random() * 12 + 5));
  document.getElementById('aff').textContent = aff;
  document.getElementById('desire').textContent = aff > 80 ? "极度渴望（全身湿透）" : "轻微发情";
  document.getElementById('mood').textContent = "娇喘期待";
  document.getElementById('clothes').textContent = "女仆装·裙摆湿透";
}

function sendMsg() {
  const input = document.getElementById('input').value.trim();
  if (!input) return;
  addMsg(input, 'user');
  document.getElementById('input').value = '';

  setTimeout(() => {
    const replies = [
      "哼，才不是因为你这样说就心动了呢！笨蛋主人♡",
      "……再、再多说点那种话……人家要忍不住了",
      "呜呜……裙子都湿透了……快负责啊！",
      "主人……你好坏……小樱下面都……（脸红）"
    ];
    addMsg(replies[Math.floor(Math.random()*replies.length)], 'ai');
    updateStatus();
    Telegram.WebApp.HapticFeedback.impactOccurred('heavy'); // 原版那种震动反馈
  }, 800);
}

// 开场白（和原版一样甜+色）
addMsg("主人～终于来找小樱了呢……今天想怎么欺负人家呀？♡", 'ai');
</script>
</body>
</html>

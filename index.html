<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tap to Earn Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial; text-align: center; background: #000; color: white; margin: 0; padding: 20px; }
        h1 { font-size: 28px; }
        #tapButton { width: 280px; height: 280px; font-size: 120px; background: gold; border: none; border-radius: 50%; margin: 30px auto; display: block; box-shadow: 0 0 30px gold; }
        #coins { font-size: 48px; margin: 20px 0; }
        #buyButton { padding: 20px 40px; font-size: 22px; background: #00ff00; border: none; border-radius: 15px; color: black; }
    </style>
</head>
<body>
    <h1>Tap to Earn Game</h1>
    <p>Tap the coin to earn points!</p>
    <button id="tapButton">🪙</button>
    <p>Your Coins: <span id="coins">0</span></p>
    <button id="buyButton">Buy Booster (1 Star) - Double your coins!</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let coins = 0;
        let multiplier = 1;

        const tapBtn = document.getElementById('tapButton');
        const coinsEl = document.getElementById('coins');
        const buyBtn = document.getElementById('buyButton');

        tapBtn.addEventListener('click', () => {
            coins += 1 * multiplier;
            coinsEl.textContent = coins;
            tapBtn.style.transform = 'scale(1.3)';
            setTimeout(() => tapBtn.style.transform = 'scale(1)', 100);
        });

        buyBtn.addEventListener('click', () => {
            tg.showConfirm('Pay 1 Star to activate booster?', function(ok) {
                if (ok) {
                    multiplier = 2;
                    tg.showAlert('🎉 Payment successful!\nBooster activated!\nNow each tap gives 2 coins!');
                }
            });
        });
    </script>
</body>
</html>

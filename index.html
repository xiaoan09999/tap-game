<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>🍦 香草AI 賽博後宮</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  body{margin:0;background:#0f0a1f;color:#e0b0ff;font-family:system-ui;}
  #app{height:100vh;display:flex;flex-direction:column;}
  header{background:#1a0033;padding:10px;text-align:center;font-size:1.5em;border-bottom:3px solid #ff6ac8;}
  .topnav{display:flex;justify-content:space-around;background:#2a004a;padding:8px;font-size:0.9em;}
  .tags{overflow-x:auto;white-space:nowrap;padding:10px;background:#140028;}
  .tag{background:#4a0066;color:white;margin:0 5px;padding:6px 14px;border-radius:20px;font-size:0.85em;display:inline-block;}
  .cards{display:flex;flex-wrap:wrap;gap:10px;padding:10px;}
  .card{width:48%;background:#1e0033;border-radius:12px;overflow:hidden;cursor:pointer;}
  .card img{width:100%;height:160px;object-fit:cover;}
  .bottom-tab{position:fixed;bottom:0;width:100%;background:#1a0033;display:flex;justify-content:space-around;padding:8px;}
  button{background:#ff6ac8;color:white;border:none;padding:10px 16px;border-radius:8px;}
</style>
</head>
<body>
<div id="app">
  <header>🍦 香草AI 賽博後宮 <span style="font-size:0.6em">小安</span></header>
  
  <!-- 顶部导航 -->
  <div class="topnav">
    <span onclick="switchPage(0)">首页</span>
    <span onclick="switchPage(1)">聊天</span>
    <span onclick="switchPage(2)">创作</span>
    <span onclick="switchPage(3)">图库</span>
    <span onclick="switchPage(4)">我的</span>
  </div>

  <!-- 标签云 -->
  <div class="tags">
    <span class="tag" onclick="alert('已切换ntr标签')">ntr</span>
    <span class="tag">妈妈</span><span class="tag">萝莉</span><span class="tag">母子</span>
    <span class="tag">媚黑</span><span class="tag">女s</span>
    <button onclick="showMoreTags()">▼ 更多标签</button>
  </div>

  <!-- 角色卡片网格（首页） -->
  <div id="home" class="cards">
    <div class="card" onclick="enterChat(0)">
      <img src="https://via.placeholder.com/300x200/330066/fff?text=女教师" alt="">
      <div style="padding:8px">抓着你鸡巴一边给你讲题一边嘲讽你的英语班主任</div>
      <div style="padding:0 8px 8px"><small>师生 · 禁忌 · 嘲讽 · 手交</small></div>
    </div>
    <div class="card" onclick="enterChat(1)">
      <img src="https://via.placeholder.com/300x200/ff6ac8/000?text=调教" alt="">
      <div style="padding:8px">调教挑战 - 你是一个三十多岁的已婚男...</div>
    </div>
    <!-- 可继续加更多卡片 -->
  </div>

  <!-- 聊天界面（默认隐藏） -->
  <div id="chatPage" style="display:none;flex-direction:column;height:100%;background:#0a0014;">
    <div style="padding:10px;background:#2a004a;display:flex;align-items:center;gap:10px;">
      <img src="https://via.placeholder.com/50" style="border-radius:50%" width="50">
      <div><b>抓着你鸡巴一边给你讲题...</b><br>刘鑫冉老师</div>
    </div>
    <div id="chatBox" style="flex:1;overflow-y:auto;padding:10px;"></div>
    <input id="msgInput" placeholder="对她说..." style="margin:10px;border-radius:30px;padding:12px;">
    <button onclick="sendChat()" style="margin:10px;">发送 + 扣5钻石</button>
    <button onclick="showModelMenu()">⚙ 模型设定（重新生成/剧情选项）</button>
    <button onclick="paySuccess()">💎 充值解锁无限（模拟）</button>
  </div>

  <div class="bottom-tab">
    <button onclick="switchPage(0)">🏠 首页</button>
    <button onclick="switchPage(1)">💬 聊天</button>
    <button onclick="switchPage(2)">✍ 创作</button>
    <button onclick="switchPage(3)">📸 图库</button>
    <button onclick="switchPage(4)">👤 我的</button>
  </div>
</div>

<script>
Telegram.WebApp.ready(); Telegram.WebApp.expand();

let diamonds = 4430;
let currentPage = 0;

function switchPage(n){
  currentPage = n;
  if(n===1){
    document.getElementById('home').style.display='none';
    document.getElementById('chatPage').style.display='flex';
    addChatMsg("刘鑫冉老师","下课铃响了...教室里只剩我们两个人...");
  }else{
    document.getElementById('home').style.display='block';
    document.getElementById('chatPage').style.display='none';
  }
}

function enterChat(i){
  switchPage(1);
}

function addChatMsg(name,text){
  const box = document.getElementById('chatBox');
  box.innerHTML += `<div style="margin:10px;background:#4a0066;padding:10px;border-radius:10px;">${name}：${text}</div>`;
  box.scrollTop = box.scrollHeight;
}

function sendChat(){
  const input = document.getElementById('msgInput');
  if(input.value){
    addChatMsg("你",input.value);
    diamonds -= 5;
    Telegram.WebApp.showAlert(`已扣5钻石！剩余 ${diamonds}`);
    input.value = '';
    // 模拟回复
    setTimeout(()=>addChatMsg("老师","哼～学生这么大胆？老师要惩罚你了♡"),800);
  }
}

function showModelMenu(){
  Telegram.WebApp.showPopup({
    title:"模型设定",
    message:"选择操作",
    buttons:[
      {id:"1",text:"重新生成"},
      {id:"2",text:"修改并重新生成"},
      {id:"3",text:"生成剧情选项"},
      {id:"4",text:"重置对话"}
    ]
  }, id=> { if(id) alert("已执行："+id); });
}

function showMoreTags(){
  Telegram.WebApp.showAlert("已展开全部标签（绿帽、明星、重口、伪娘...共50+）");
}

function paySuccess(){
  Telegram.WebApp.showPopup({
    title:"选择支付方式",
    message:"$19.99 月度会员",
    buttons:[
      {id:"alipay",text:"支付宝"},
      {id:"wechat",text:"微信"},
      {id:"usdt",text:"USDT"},
      {id:"stars",text:"Telegram Stars"}
    ]
  }, id=>{
    Telegram.WebApp.showAlert("✅ 支付成功！已解锁VIP + 无限聊天 + 全部角色");
    diamonds += 220000;
  });
}

// 开场
addChatMsg("系统","欢迎回来小安～ 今日签到 +1000钻石 已到账");
switchPage(0);
</script>
</body>
</html>
